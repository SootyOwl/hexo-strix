# HeXO AlphaZero — Depth-extension experiment (4-layer + LayerScale)
#
# Branched from gine-champion-prune-penalty-mini.toml on 2026-05-09.
#
# Hypothesis:
#   The 3-layer mini model is depth-bound. layer_analysis/conv_ratio at S3
#   (~step 172k) shows layer 2 contributing 13.7x the residual and still
#   growing. Adding a 4th GINEConv layer should redistribute work, drop
#   layer 2's ratio, and yield a head-to-head Elo gain via SPRT.
#
# Full rationale, falsification criteria, and experiment plan in:
#   docs/research/2026-05-09-depth-extension-hypothesis.md
#
# Differences from gine-mini/baseline.toml (production):
#   [model] num_layers                       : 3     -> 4
#   [model] use_layer_scale                  : false -> true
#   [training] lr_warmup_steps               : 400   -> 5000   (graft + Adam-runaway safeguard)
#   [training] layer_scale_weight_decay      : 0.0   -> 1e-4   (gentle pull-toward-0 on gates)
#   [run] checkpoint_dir                     : runs/gine-champion-mini/... -> runs/gine-mini-4l/...
#   [run] log_dir                            : runs/...
#   [[curriculum.stages]] run_log_dir entries: rebased to runs/gine-mini-4l/
#
# Resume from a copied production checkpoint; the smart checkpoint loader
# will graft layer 3 (zero-init GINE MLP final linear, layer_scale init 1e-4)
# and preserve layers 0-2 bit-exactly. The forward pass is still bit-exact
# identity at step 0: `layer_scale * conv_out = 1e-4 * 0 = 0` exactly in fp32.
# The 1e-4 (not 0.0) is essential — with double-zero-init, both `∂L/∂scale`
# and `∂L/∂conv_3` evaluate to exactly zero, leaving layer 3 dead-stuck
# (the 2026-05-10 second-attempt failure mode).
#
# The trainer detects fresh params and applies fresh warmup over
# `lr_warmup_steps` (verified by `test_resume_with_arch_change_applies_fresh_warmup`).
# Production resume is unaffected because no fresh params are introduced when
# resuming the 3-layer baseline (verified by
# `test_resume_no_arch_change_preserves_fast_forward`).
#
# Defense-in-depth against Adam normalization runaway:
#   1. layer_scale[3] init = 1e-4 + zero-init MLP final → forward bit-exact identity
#      at step 0, but gradient flows into conv_3 from step 1 (avoids dead-stuck)
#   2. lr_warmup_steps = 5000 (slow ramp lets conv_3 stabilize before gate grows)
#   3. layer_scale_weight_decay = 1e-4 (gentle pull toward 0 unless gradient justifies growth)
#
# The 2026-05-09 first attempt regressed (loss +20%, SPRT 0.29) because warmup
# was skipped on resume. The 2026-05-10 second attempt was dead-stuck (no
# regression, but no progress either) because layer_scale init was 0.0,
# producing the double-zero failure mode. See:
#   - project_layerscale_graft_failure.md (memory)
#   - docs/research/2026-05-09-depth-extension-hypothesis.md
#
# WARNING: do NOT point this config at the production checkpoint_dir
# (runs/gine-champion-mini). Both for safety (don't co-mingle with the
# active run) and for the experiment's integrity (the SPRT comparison
# needs a clean fork).

# Multi-stage curriculum — automatically advances through progressively harder game variants.
[curriculum]
# Convergence detection
convergence_mode = "sprt"                # How to detect convergence: 'champion' (vs champion checkpoint, fixed-N eval), 'sprt' (vs champion checkpoint, continuous SPRT daemon), 'checkpoint' (vs lagged checkpoint), 'random' (vs random opponent), or 'none' (manual only)
patience = 10                            # Random: consecutive evals above threshold to advance. Checkpoint: rolling window size for plateau detection. Champion: consecutive non-promotion evals before declaring plateau (reset on each promotion).
min_steps_per_stage = 10000              # Minimum training steps before convergence checks begin (warmup period)
confirm_advance = true                   # When convergence is detected, pause and wait for a CONFIRM file in the checkpoint dir before advancing. Training continues while waiting.
# Mode: random
win_rate_threshold = 0.85                # Win rate vs random opponent that counts as converged (mode=random)
# Mode: checkpoint
improve_threshold = 0.55                 # Mean win rate vs lagged checkpoint below which the model is considered plateaued (mode=checkpoint). Averaged over the last `patience` evaluations.
checkpoint_lag = 30                      # Compare against the checkpoint from N saves ago for convergence detection
# Mode: champion
champion_threshold = 0.55                # Win rate vs champion to promote trainee to new champion. If mean win rate stays below this for `patience` evals, stage is considered plateaued and auto-advances (mode=champion).
# Mode: sprt
sprt_s0 = 0.50                           # Null hypothesis (trainee not stronger than champion) per-game score (mode=sprt).
sprt_s1 = 0.55                           # Alternative hypothesis (trainee stronger, worth promoting) per-game score (mode=sprt).
sprt_alpha = 0.01                        # Per-round SPRT type-I error rate.
sprt_beta = 0.05                         # Per-round SPRT type-II error rate.
sprt_alpha_stage = 0.0                   # 0 = disabled, use sprt_alpha directly per round (mode=sprt).
sprt_beta_stage = 0.0                    # 0 = disabled, use sprt_beta directly per round (mode=sprt).
sprt_window_size = 400                   # Sliding window of recent games for SPRT state; older games are dropped. 0 = unbounded accumulation.
sprt_mcts_sims = 32                      # MCTS simulations per placement during SPRT eval games.
sprt_mcts_m_actions = 16                 # Root candidate actions for SPRT eval MCTS.
sprt_device = "cpu"                      # Device for SPRT daemon inference.
sprt_poll_interval = 2.0                 # Seconds between SPRT state-file polls by the trainer.
sprt_reject_patience = 3                 # Cumulative SPRT rounds terminating in reject_h1 before declaring stage plateau and advancing.
sprt_promotion_grace_steps = 1000        # Training steps after a champion promotion (or stage start) during which reject_h1 rounds do not count toward sprt_reject_patience.
sprt_pentanomial = true                  # Pair consecutive P1/P2 games and use 5-bucket pair scores as the statistical unit.
sprt_pair_variance = 0.5                 # Per-pair score variance for pentanomial LLR.
sprt_adaptive_pair_variance = true       # Adaptively track pair variance via EMA of round-end empirical estimates.
sprt_adaptive_pair_variance_floor = 0.20 # Minimum pair variance when adaptive tracking is on.
sprt_adaptive_pair_variance_ceil = 0.50  # Maximum pair variance when adaptive tracking is on.
sprt_adaptive_pair_variance_ema_alpha = 0.10  # EMA weight on the latest empirical observation.

# GNN model architecture — DEPTH-EXTENDED variant (the experimental delta).
[model]
# Backbone
hidden_dim = 128                         # Hidden dimensionality used throughout the GNN and attention layers
num_layers = 4                           # *** EXPERIMENT: was 3, extended to 4 per depth-extension hypothesis ***
num_heads = 8                            # Number of attention heads per layer (inert for GINE; preserved for config compatibility)
conv_type = "gine"                       # GINEConv (sum aggregation with edge injection, no attention)
pre_norm = true                          # Use pre-norm residual blocks
dropout = 0.0                            # Dropout probability applied after each layer (0.0 = disabled)
use_layer_scale = true                   # *** EXPERIMENT: per-channel learnable gate on each residual block's conv contribution. ***
                                         # Init: 1.0 for layers loaded from checkpoint (preserves trained dynamics bit-exactly);
                                         # 1e-4 for layers grafted on load (combined with zero-init GINE MLP final linear,
                                         # the grafted layer is exact identity at init in fp32). LayerScale params are
                                         # excluded from weight decay automatically (see Trainer.split_param_groups).
# Output heads
policy_hidden = 64                       # Hidden size of the policy head MLP
value_hidden = 64                        # Hidden size of the value head MLP
# Graph construction
graph_type = "axis"                      # Graph topology: 'hex' or 'axis'
prune_empty_edges = true                 # Drop empty→empty edges in axis-window graphs

# Game rules — overridable per curriculum stage.
[game]
win_length = 6                           # Number of consecutive hexes needed to win
placement_radius = 8                     # Maximum hex-distance from origin for new placements
max_moves = 200                          # Game declared a draw after this many total placements

# Gumbel AlphaZero MCTS parameters.
[mcts]
n_simulations = 128                      # Number of MCTS simulations per placement.
m_actions = 16                           # Number of candidate actions sampled via Gumbel-Top-k at the root.
c_scale = 1.0                            # Q-value scaling factor in completed-Q sigma formula.
c_visit = 50                             # Visit count baseline in completed-Q sigma formula.
exploration_moves = 30                   # Fixed number of opening placements in exploration regime.
exploration_fraction = 0.25              # Fraction of EMA game length used as exploration placements.
exploration_max = 0.9                    # Adaptive exploration ceiling.
exploration_window = 2000                # EMA effective window for the p1 decided rate.
exploration_exponent = 1.0               # Exponent for the adaptive exploration deviation curve.

# Gradient updates, learning rate schedule, loss functions, and replay buffer.
[training]
# Optimizer
batch_size = 512                         # Maximum number of examples per gradient step
edge_budget = 500000                     # Target total edges per micro-batch for auto batch sizing
grad_accumulation = true                 # Accumulate gradients over micro-batches
lr = 0.0002                              # Adam learning rate
weight_decay = 0.0001                    # L2 regularisation coefficient via AdamW
layer_scale_weight_decay = 0.0001        # *** EXPERIMENT: was 0.0 (excluded). Added 2026-05-09 (post-runaway-incident) ***
                                         # to gently pull layer_scale gates toward 0 unless gradient signal justifies
                                         # growth. Counters Adam's normalization-driven runaway directly.
max_grad_norm = 1.0                      # Gradient clipping threshold
# LR schedule
lr_schedule = "cosine"                   # Learning rate schedule
lr_min = 2e-05                           # Minimum learning rate floor for cosine decay
lr_warmup_steps = 5000                   # *** EXPERIMENT: was 400 (production). Bumped to 5000 (was 1000 in this config) ***
                                         # after the 2026-05-09 graft-runaway incident. 1000 was insufficient because
                                         # Adam normalization undoes the chain-rule scaling. 5000 gives ~5x the safety
                                         # margin while conv_3 weights stabilize before layer_scale[3] grows past noise.
                                         # See docs/research/2026-05-09-depth-extension-hypothesis.md.
total_train_steps = 60000                # Total cosine period in steps before reaching lr_min
# Throttle
step_delay = 0.0                         # Seconds to sleep between training steps
target_reuse = 8.0                       # Target sample reuse rate.
max_step_delay = 5.0                     # Safety cap for the auto-throttle controller.
step_delay_smoothing = 0.8               # EMA smoothing factor on the controller output.
# Loss
draw_value = 0                           # Value target for drawn games.
pc_loss_weight = 0.0                     # Weight for path consistency regularisation loss
# Data
augment_symmetries = true                # Apply D6 symmetry augmentation
buffer_capacity = 250000                 # Maximum number of positions stored in the replay buffer
reanalyze_fraction = 0.0                 # Fraction of each training batch to re-evaluate with the current model

# Self-play engine selection and shared settings across both engines.
[self_play]
engine = "rust"                          # Which self-play engine to use
device = "cuda"                          # Device for self-play inference
workers = 0                              # Number of parallel self-play game threads
precision = "bf16"                       # Model precision for self-play inference
model_update_interval = 0                # Export updated model for self-play every N training steps

# Settings specific to the Rust self-play engine (batched inference server).
[self_play.rust]
# Batching
max_batch = 128                          # Maximum number of game positions batched into a single inference forward pass
batch_timeout_ms = 5                     # Milliseconds to wait for a full batch before running a partial one
# Inference
padded_inference = true                  # Use bucket-padded GNN inference
python_inference = false                 # Use a Python subprocess with torch.compile for inference instead of TorchScript
# Output
max_file_mb = 2048                       # Rotate output game files when they reach this size in MB
output_filename = "games"                # Base filename stem for game output files
# Past-self pool — disabled.
pool_fraction = 0
pool_size = 8
pool_snapshot_every = 1
# Playout cap
playout_cap_fraction = 0.0
playout_cap_divisor = 4

# Settings specific to the Python self-play engine.
[self_play.python]
games_per_write = 50
playout_cap_fraction = 0.75
playout_cap_divisor = 4
use_rust_mcts = true

# Evaluation schedule, checkpointing, and opponent settings.
[eval]
interval = 2000                          # Run evaluation every N training steps
checkpoint_interval = 300                # Save a model checkpoint every N training steps
model_analysis_interval = 200            # *** EXPERIMENT: high-resolution layer_analysis logging (~10x normal). ***
                                         # Required to monitor layer_scale[3] growth + gated_conv_ratio during the
                                         # 0-5000 step warmup window where graft success/failure is decided.
                                         # Cheap (~100ms per call) so the 10x cadence is not cost-bound.
games = 10                               # Number of games per evaluation round
sims = 16                                # MCTS simulations per placement during eval games
m_actions = 16                           # Candidate actions for MCTS during eval games

# Adaptive SealBot evaluation
[eval.sealbot]
games = 0
sims = 32
m_actions = 16
adaptive = true
time_limit = 0.5
levels = [0.05, 0.1, 0.2, 0.5, 1.0, 2.0]
promote_threshold = 0.7
promote_patience = 2
win_length = 6
placement_radius = 8
max_moves = 200
workers = 8

# Runtime environment — devices, directories, and compilation settings.
[run]
device = "cuda"                          # PyTorch device for training
checkpoint_dir = "runs/gine-mini-4l/checkpoints"   # *** EXPERIMENT: separate from production runs/gine-champion-mini ***
log_dir = "runs/gine-mini-4l"            # *** EXPERIMENT: separate TB log root ***
compile = true                           # Enable torch.compile
fp16 = true                              # Use bf16 mixed precision

# --- Per-stage overrides ---
# Each stage can override fields from [game], [mcts], [training],
# [eval], [self_play], and [run] (e.g., lr, log_dir).
#
# Note: when resuming from a checkpoint mid-curriculum (e.g. mid-S3),
# the loader auto-advances to the resumed stage. The earlier W1/W2/S1/S2
# stages are retained for completeness / reproducibility from scratch.

# --- Warm-up stages: learn fundamentals with short win conditions ---

[[curriculum.stages]]
name = "W1: 4-in-a-row, radius 2"
log_dir = "runs/gine-mini-4l/w1-4-2"
game_win_length = 4
game_placement_radius = 2
game_max_moves = 20
convergence_mode = "random"
win_rate_threshold = 0.95
patience = 5
min_steps_per_stage = 1000
confirm_advance = false
eval_games = 20
eval_sims = 0
eval_interval = 200
self_play_rust_playout_cap_fraction = 0
self_play_rust_playout_cap_divisor = 1

[[curriculum.stages]]
name = "W2: 5-in-a-row, radius 2"
run_log_dir = "runs/gine-mini-4l/w2-5-2"
game_win_length = 5
game_placement_radius = 2
game_max_moves = 30
convergence_mode = "random"
win_rate_threshold = 0.95
patience = 5
min_steps_per_stage = 1000
confirm_advance = false
eval_games = 20
eval_sims = 0
eval_interval = 200
self_play_rust_playout_cap_fraction = 0
self_play_rust_playout_cap_divisor = 1

# --- Main curriculum: 6-in-a-row, scaling radius ---

[[curriculum.stages]]
name = "S1: 6-in-a-row, radius 2"
run_log_dir = "runs/gine-mini-4l/s1-6-2"
game_win_length = 6
game_placement_radius = 2
game_max_moves = 200
min_steps_per_stage = 5000
confirm_advance = false

[[curriculum.stages]]
name = "S2: 6-in-a-row, radius 4"
run_log_dir = "runs/gine-mini-4l/s2-6-4"
game_win_length = 6
game_placement_radius = 4
game_max_moves = 200
confirm_advance = false

[[curriculum.stages]]
name = "S3: 6-in-a-row, radius 6"
run_log_dir = "runs/gine-mini-4l/s3-6-6"
game_win_length = 6
game_placement_radius = 6
game_max_moves = 200
mcts_n_simulations = 128

[[curriculum.stages]]
name = "S4: 6-in-a-row, radius 8 (FULL HEXO)"
run_log_dir = "runs/gine-mini-4l/s4-6-8"
game_win_length = 6
game_placement_radius = 8
game_max_moves = 200
mcts_n_simulations = 200
sprt_reject_patience = 10
