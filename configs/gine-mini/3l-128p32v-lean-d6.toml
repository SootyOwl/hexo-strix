game_win_length = 4
game_placement_radius = 2
game_max_moves = 20
convergence_mode = "random"
win_rate_threshold = 0.90
patience = 5
min_steps_per_stage = 1000
confirm_advance = false
eval_sims = 0
eval_interval = 200
