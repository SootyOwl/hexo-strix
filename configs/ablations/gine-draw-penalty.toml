# HeXO AlphaZero — GINEConv + Draw Penalty Ablation
# Two changes from baseline: conv_type = "gine" + draw_value = -0.1.
# Tests whether penalising draws encourages more decisive play.

[model]
hidden_dim = 256
num_layers = 3
num_heads = 8
conv_type = "gine"
policy_hidden = 128
value_hidden = 128
dropout = 0.0
graph_type = "axis"
pre_norm = true

[game]
win_length = 6
placement_radius = 8
max_moves = 200

[mcts]
n_simulations = 64
m_actions = 16
c_scale = 1.0
c_visit = 50
exploration_moves = 16  # Number of opening placements that sample from the improved policy pi' instead of using the Gumbel-selected action (1 placement = 1 stone, a full turn is 2 placements). After this many placements, action selection uses g + logits + sigma +(Q) which is still stochastic via Gumbel noise but biased toward the current policy.
# Use adaptive exploration
exploration_fraction = 0.25  # base exploration fraction when p1 and p2 are balanced
exploration_max = 0.95  # max exploration fraction when sides are imbalanced
exploration_window = 2000  # window of games to consider for the p1_rate calculation in the EMA. alpha = 2 / (window + 1)
exploration_exponent = 1.0  # derivation exponent

[training]
batch_size = 512
edge_budget = 500000
grad_accumulation = true  # split the full batch_size into edge_budget-sized chunks
target_reuse = 8.0

augment_symmetries = true

weight_decay = 0.0001
max_grad_norm = 1.0
lr = 0.0002
lr_schedule = "cosine"
lr_min = 2e-05
lr_warmup_steps = 400
total_train_steps = 5000
buffer_capacity = 250000

draw_value = -0.1
reanalyze_fraction = 0.0
pc_loss_weight = 0.0

[self_play]
engine = "rust"
device = "cuda"
workers = 0
precision = "bf16"
model_update_interval = 300

[self_play.rust]
max_batch = 128
batch_timeout_ms = 5
max_file_mb = 2048
output_filename = "games"
pool_size = 32
pool_snapshot_every = 5
pool_fraction = 0.3
playout_cap_fraction = 0.75
playout_cap_divisor = 4
python_inference = true

[self_play.python]
games_per_write = 50
playout_cap_fraction = 0.75
playout_cap_divisor = 4
use_rust_mcts = true

[eval]
interval = 1000
checkpoint_interval = 300
games = 50
# Eval sims exceed training sims for cleaner signal
# (paper Figure 9: higher eval-n gives substantial Elo boost at fixed train-n).
sims = 256
m_actions = 16

[eval.sealbot]
games = 20
adaptive = true
sims = 128
m_actions = 16
time_limit = 0.5
levels = [0.05, 0.1, 0.2, 0.5, 1.0, 2.0]
promote_threshold = 0.7
promote_patience = 2
# Always eval against sealbot at full HTTTX rules
win_length = 6
placement_radius = 8
max_moves = 1000

[run]
device = "cuda"
checkpoint_dir = "runs/ablation-gine-draw/checkpoints"
log_dir = "runs"
compile = true
fp16 = true

[curriculum]
convergence_mode = "checkpoint"
confirm_advance = true
win_rate_threshold = 0.90
improve_threshold = 0.55
patience = 10
checkpoint_lag = 30
min_steps_per_stage = 30000

# --- Warm-up stages: learn fundamentals with short win conditions ---
# Auto-advance when beating random >=90%. Fast games, no manual confirmation.

[[curriculum.stages]]
name = "W1: 4-in-a-row, radius 2"
run_log_dir = "runs/ablation-gine-draw/w1-4-2"
game_win_length = 4
game_placement_radius = 2
game_max_moves = 20
convergence_mode = "random"
win_rate_threshold = 0.90
patience = 3
min_steps_per_stage = 1000
confirm_advance = false
eval_games = 20
eval_sims = 0
eval_sealbot_games = 0
eval_interval = 200

[[curriculum.stages]]
name = "W2: 5-in-a-row, radius 2"
run_log_dir = "runs/ablation-gine-draw/w2-5-2"
game_win_length = 5
game_placement_radius = 2
game_max_moves = 30
convergence_mode = "random"
win_rate_threshold = 0.90
patience = 3
min_steps_per_stage = 1000
confirm_advance = false
eval_games = 20
eval_sims = 0
eval_sealbot_games = 0
eval_interval = 200

# --- Main curriculum: 6-in-a-row, scaling radius ---

[[curriculum.stages]]
name = "S1: 6-in-a-row, radius 2"
run_log_dir = "runs/ablation-gine-draw/s1-6-2"
game_win_length = 6
game_placement_radius = 2
game_max_moves = 60
min_steps_per_stage = 10_000
patience = 5
checkpoint_lag = 10
eval_games = 20
eval_sims = 64
eval_sealbot_games = 5

[[curriculum.stages]]
name = "S2: 6-in-a-row, radius 4"
run_log_dir = "runs/ablation-gine-draw/s2-6-4"
game_win_length = 6
game_placement_radius = 4
game_max_moves = 60
eval_games = 20
eval_sims = 128
eval_sealbot_games = 10

[[curriculum.stages]]
name = "S3: 6-in-a-row, radius 6"
run_log_dir = "runs/ablation-gine-draw/s3-6-6"
game_win_length = 6
game_placement_radius = 6
game_max_moves = 80
mcts_n_simulations = 128

[[curriculum.stages]]
name = "S4: 6-in-a-row, radius 8 (FULL HEXO)"
run_log_dir = "runs/ablation-gine-draw/s4-6-8"
game_win_length = 6
game_placement_radius = 8
game_max_moves = 80
mcts_n_simulations = 200
eval_sealbot_games = 50
convergence_mode = "none"

