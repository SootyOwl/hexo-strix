# HeXO AlphaZero — Ablation: Prune Empty→Empty Edges
# Identical to baseline except prune_empty_edges = true.
# Drops empty→empty edges in axis-window graphs (~88% edge reduction).
# Empties still receive stone messages and connect via the dummy node.

[model]
hidden_dim = 256
num_layers = 3
num_heads = 8
policy_hidden = 128
value_hidden = 128
dropout = 0.0
graph_type = "axis"
prune_empty_edges = true
pre_norm = true

[game]
win_length = 6
placement_radius = 8
max_moves = 200

[mcts]
n_simulations = 128
m_actions = 16
c_scale = 1.0
c_visit = 50
exploration_moves = 16
exploration_fraction = 0.25
exploration_max = 0.95
exploration_window = 2000
exploration_exponent = 1.0

[training]
batch_size = 512
edge_budget = 500000
grad_accumulation = false
target_reuse = 8.0

augment_symmetries = true

weight_decay = 0.0001
max_grad_norm = 1.0
lr = 0.0002
lr_schedule = "cosine"
lr_min = 2e-05
lr_warmup_steps = 400
total_train_steps = 5000
buffer_capacity = 250000

draw_value = -0.1
reanalyze_fraction = 0.0
pc_loss_weight = 0.0

[self_play]
engine = "rust"
device = "cuda"
workers = 0
precision = "bf16"
model_update_interval = 300

[self_play.rust]
max_batch = 80
batch_timeout_ms = 2
max_file_mb = 2048
output_filename = "games"
pool_size = 32
pool_snapshot_every = 5
pool_fraction = 0.3
playout_cap_fraction = 0.75
playout_cap_divisor = 4
python_inference = true

[self_play.python]
games_per_write = 50
playout_cap_fraction = 0.75
playout_cap_divisor = 4
use_rust_mcts = true

[eval]
interval = 1000
checkpoint_interval = 300
games = 50
sims = 256
m_actions = 16

[eval.sealbot]
games = 20
adaptive = true
sims = 128
m_actions = 16
time_limit = 0.5
levels = [0.05, 0.1, 0.2, 0.5, 1.0, 2.0]
promote_threshold = 0.7
promote_patience = 2
win_length = 6
placement_radius = 8
max_moves = 1000

[run]
device = "cuda"
checkpoint_dir = "runs/ablation-prune-empty/checkpoints"
log_dir = "runs"
compile = true
fp16 = true

[curriculum]
convergence_mode = "checkpoint"
confirm_advance = true
win_rate_threshold = 0.90
improve_threshold = 0.55
patience = 10
checkpoint_lag = 30
min_steps_per_stage = 30000

# --- Warm-up stages: learn fundamentals with short win conditions ---

[[curriculum.stages]]
name = "W1: 4-in-a-row, radius 2"
run_log_dir = "runs/ablation-prune-empty/w1-4-2"
game_win_length = 4
game_placement_radius = 2
game_max_moves = 30
convergence_mode = "random"
win_rate_threshold = 0.90
patience = 3
min_steps_per_stage = 1000
confirm_advance = false
eval_games = 20
eval_sims = 0
eval_sealbot_games = 0
eval_interval = 200

[[curriculum.stages]]
