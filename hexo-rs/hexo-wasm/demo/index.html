<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>strixbot wasm demo</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  textarea { width: 100%; height: 10rem; font-family: monospace; font-size: 0.85rem; }
  pre { background: #f4f4f4; padding: 0.75rem; overflow-x: auto; }
  button { padding: 0.4rem 1.2rem; font-size: 1rem; }
  .status { color: #666; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>strixbot wasm demo</h1>
<p class="status" id="status">loading worker…</p>
<p>Position JSON (config must match the model's training <code>game_config</code> shown at ready):</p>
<textarea id="position"></textarea>
<p>
  <button id="think" disabled>think (sims=64)</button>
  <button id="evaluate" disabled>evaluate (no search)</button>
</p>
<pre id="out">—</pre>
<script type="module">
  const status = document.getElementById("status");
  const out = document.getElementById("out");
  const posBox = document.getElementById("position");
  const thinkBtn = document.getElementById("think");
  const evalBtn = document.getElementById("evaluate");

  const worker = new Worker("worker.js", { type: "module" });
  worker.onmessage = (ev) => {
    const msg = ev.data;
    if (msg.type === "ready") {
      status.textContent = `ready — ${msg.info.source_checkpoint} (train_steps ${msg.info.train_steps})`;
      const gc = msg.info.game_config ? JSON.parse(msg.info.game_config)
                                      : { win_length: 6, placement_radius: 6, max_moves: 300 };
      posBox.value = JSON.stringify({
        config: gc,
        stones: [{ q: 0, r: 0, player: 1 }],
        to_move: 2,
        moves_remaining: 2,
      }, null, 1);
      thinkBtn.disabled = evalBtn.disabled = false;
    } else if (msg.type === "move") {
      out.textContent = `move: (${msg.result.move.q}, ${msg.result.move.r})  value: ${msg.result.value.toFixed(4)}  in ${msg.ms.toFixed(0)} ms\n\ntop policy:\n` +
        msg.result.policy.slice(0, 8).map(e => `  (${e.q},${e.r})  p=${e.p.toFixed(4)}`).join("\n");
    } else if (msg.type === "eval") {
      out.textContent = `value: ${msg.result.value.toFixed(4)}\n\ntop prior:\n` +
        msg.result.policy.slice(0, 8).map(e => `  (${e.q},${e.r})  p=${e.p.toFixed(4)}`).join("\n");
    } else if (msg.type === "error") {
      out.textContent = `ERROR: ${msg.error}`;
    }
  };
  worker.postMessage({ type: "init", weightsUrl: "weights.safetensors" });

  thinkBtn.onclick = () => {
    out.textContent = "thinking…";
    worker.postMessage({ type: "best_move", position: JSON.parse(posBox.value), sims: 64, mActions: 16, seed: 0 });
  };
  evalBtn.onclick = () => {
    worker.postMessage({ type: "evaluate", position: JSON.parse(posBox.value) });
  };
</script>
</body>
</html>
