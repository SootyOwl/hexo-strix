<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>HeXO games · admin</title>
<link rel="stylesheet" href="__PREFIX_RAW__/static/observatory.css?v=__ASSET_V__">
<style>
/* Observatory palette + fonts come from observatory.css; admin is a scrolling
   document, so override the full-screen app-shell body rule. */
body {{ display: block; height: auto; overflow: auto; padding: 22px 26px; }}
h1 {{ display: flex; align-items: baseline; gap: 10px; margin: 0 0 16px; }}
h1 .mark {{ font-size: 30px; }}
.admin-tag {{ font-family: "Martian Mono", monospace; font-size: 9px; letter-spacing: 3px;
             text-transform: uppercase; color: var(--brass); border: 1px solid var(--brass);
             border-radius: 2px; padding: 3px 8px; align-self: center; }}
h2 {{ font-family: "Instrument Serif", serif; font-weight: 400; font-size: 22px;
     color: var(--brass); margin: 20px 0 8px; }}
.summary {{ background: var(--panel); border: 1px solid var(--line); padding: 12px 16px;
           border-radius: 8px; margin-bottom: 16px; display: flex; gap: 22px; flex-wrap: wrap;
           font-family: "Martian Mono", monospace; font-size: 12px; color: var(--muted); }}
.summary b {{ color: var(--brass); }}
table {{ width: 100%; border-collapse: collapse; font-family: "Martian Mono", monospace; font-size: 11.5px; }}
th, td {{ padding: 7px 11px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }}
th {{ background: var(--panel); color: var(--brass); position: sticky; top: 0; z-index: 2;
     font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }}
tr.row:hover {{ background: var(--panel-2); }}
.p1 {{ color: var(--p1); font-weight: 600; }}
.p2 {{ color: var(--p2); font-weight: 600; }}
.win-human {{ color: var(--good); }}
.win-bot {{ color: var(--bad); }}
.result-resign {{ color: var(--faint); font-style: italic; }}
.step {{ color: var(--phos); }}
.elo-src {{ color: var(--faint); }}
button {{ padding: 4px 9px; background: var(--panel-2); color: var(--muted);
         border: 1px solid var(--line-bright); border-radius: 4px; cursor: pointer;
         font-family: "Hanken Grotesk", sans-serif; font-size: 11px; }}
button:hover {{ color: var(--text); border-color: var(--brass); }}
.htttx-row {{ display: none; background: var(--ink); }}
.htttx-row.show {{ display: table-row; }}
.htttx-row pre {{ padding: 8px 14px; margin: 0; font-family: "Martian Mono", monospace; font-size: 11px;
                  color: var(--muted); white-space: pre-wrap; word-break: break-all; }}
.copy-msg {{ color: var(--good); margin-left: 6px; font-size: 11px; }}
.empty {{ padding: 40px; text-align: center; color: var(--faint); }}
</style></head>
<body>
<h1><span class="mark">He<span class="mark-x">X</span>O</span><span class="admin-tag">games · admin</span></h1>
<div class="summary">{summary}</div>
{active}
<h2>Completed games</h2>
{table}
<script>
function toggleHtttx(id) {{
  const r = document.getElementById("htttx-" + id);
  r.classList.toggle("show");
}}
async function copyHtttx(id) {{
  const text = document.getElementById("htttx-text-" + id).textContent;
  const msg = document.getElementById("msg-" + id);
  try {{
    await navigator.clipboard.writeText(text);
    msg.textContent = "copied";
  }} catch (e) {{
    msg.textContent = "fail: " + e;
  }}
  setTimeout(() => {{ msg.textContent = ""; }}, 1500);
}}
</script>
</body></html>
